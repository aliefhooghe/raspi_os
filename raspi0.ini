[binaries]
c = 'clang'
ar = 'llvm-ar'
objcopy = 'llvm-objcopy'
strip = 'llvm-strip'

[built-in options]
c_args = ['--target=armv6k-none-eabi', '-mcpu=arm1176jzf-s', '-fpic', '-ffreestanding', '-nostdlib', '-static', '-Wall', '-Wextra', '-Wno-language-extension-token']
c_link_args = ['--target=armv6k-none-eabi', '-mcpu=arm1176jzf-s',  '-fpic', '-ffreestanding', '-nostdlib', '-static', '-Werror']

[host_machine]
system = 'none'
cpu_family = 'arm'
cpu = 'arm1176jzf-s'
endian = 'little'
